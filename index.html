<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria | Cuidado Integral para Mascotas</title>
    <meta name="description" content="Servicios veterinarios profesionales para el cuidado de tus mascotas.">
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#F9B872">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Veterinaria">
    <link class="apple-touch-icon" href="assets/images/icon-192.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFFFFF;
            --secondary: #F9B872;
            --accent: #FAE7A5;
            --blue: #B6E1E7;
            --text: #333333;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lato', sans-serif;
        }

        body {
            background-color: var(--primary);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header / Nav */
        .header {
            background: var(--primary);
            box-shadow: var(--shadow);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        /* Botón de instalación personalizado flotante */
        #btnInstalar {
            display: none;
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 1001;
            background: #F9B872;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        #btnInstalar:hover {
            background: var(--accent);
            color: var(--text);
            transform: scale(1.05);
        }

        /* Secciones del Sitio (Ocupan todo el ancho de pantalla) */
        .section {
            padding: 80px 0;
            width: 100%;
        }

        /* Reglas Responsivas Celulares (Sin recuadros laterales raros) */
        @media (max-width: 768px) {
            #btnInstalar {
                top: auto;
                bottom: 30px;
                right: 20px;
            }
        }
    </style>
</head>
<body>

    <button id="btnInstalar">📲 Instalar App</button>

    <header class="header">
        <div class="container">
            <div class="logo">
                <h2 style="color: var(--secondary);">Veterinaria</h2>
            </div>
        </div>
    </header>

    <main style="margin-top: 80px;">
        <section class="section">
            <div class="container">
                <h1>Tu Contenido de Veterinary Aquí</h1>
                <p>Esta estructura se expande completamente en dispositivos móviles sin dejar márgenes extraños a los lados.</p>
            </div>
        </section>
    </main>

    <script>
        // 1. REGISTRO DEL SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker activo para Veterinary:', reg.scope))
                    .catch(err => console.error('Error al registrar el Service Worker:', err));
            });
        }

        // 2. CAPTURAR EVENTO DE INSTALACIÓN PERSONALIZADO (A2HS)
        let deferredPrompt;
        const btnInstalar = document.getElementById('btnInstalar');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Evita el banner automático del navegador
            e.preventDefault();
            // Guarda el evento
            deferredPrompt = e;
            // Muestra el botón flotante
            btnInstalar.style.display = 'block';
        });

        btnInstalar.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`El usuario decidió instalar la app: ${outcome}`);
                deferredPrompt = null;
                btnInstalar.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            btnInstalar.style.display = 'none';
            deferredPrompt = null;
            console.log('¡Veterinary PWA instalada localmente con éxito!');
        });
    </script>
</body>
</html>
